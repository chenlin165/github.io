<!DOCTYPE html>
<html lang="zh-CN">
<!-- 声明文档类型为HTML，语言为中文 -->
<head>
    <meta charset="UTF-8">
    <!-- 设置字符编码为UTF-8，避免中文乱码 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 适配移动端，设置视口宽度为设备宽度，初始缩放比例1 -->
    <title>我的浏览器首页</title>
    <!-- 网页标题，显示在浏览器标签栏 -->
    <style>
        /* 全局样式重置，清除默认边距和内边距，统一盒模型 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
            /* 统一字体，提升美观度 */
        }

        /* 页面主体样式 - 护眼色背景 */
        body {
            background-color: #e6f7f0;
            /* 柔和的绿色系护眼色，长时间看不易疲劳 */
            padding: 20px;
            /* 页面内边距，避免内容贴边 */
        }

        /* 时间日期显示区域样式 */
        .time-date {
            text-align: center;
            /* 文字居中 */
            font-size: 20px;
            /* 字体大小 */
            color: #333;
            /* 文字颜色 */
            margin-bottom: 30px;
            /* 与下方搜索框的间距 */
            padding: 10px 0;
            /* 上下内边距，增加点击区域 */
        }

        /* 百度搜索框容器样式 */
        .baidu-search {
            width: 600px;
            /* 搜索框宽度，和百度首页一致 */
            margin: 0 auto 40px;
            /* 水平居中，与下方收藏栏间距 */
            position: relative;
            /* 为子元素绝对定位做铺垫 */
        }

        /* 百度搜索输入框样式 */
        .baidu-search input {
            width: 100%;
            /* 占满容器宽度 */
            height: 44px;
            /* 搜索框高度 */
            padding: 0 80px 0 15px;
            /* 内边距：右方预留按钮空间，左方留空白 */
            border: 1px solid #ced4da;
            /* 边框样式 */
            border-radius: 22px;
            /* 圆角，和百度搜索框一致 */
            font-size: 16px;
            /* 输入文字大小 */
            outline: none;
            /* 清除聚焦时的默认外边框 */
            transition: border-color 0.3s;
            /* 边框颜色过渡效果，提升交互感 */
        }

        /* 输入框聚焦时的样式 */
        .baidu-search input:focus {
            border-color: #409eff;
            /* 聚焦时边框变蓝色 */
            box-shadow: 0 0 5px rgba(64, 158, 255, 0.3);
            /* 轻微阴影，突出聚焦状态 */
        }

        /* 百度搜索按钮样式 */
        .baidu-search button {
            position: absolute;
            /* 绝对定位，靠右 */
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            /* 垂直居中 */
            height: 34px;
            width: 70px;
            background-color: #409eff;
            /* 百度蓝配色 */
            color: white;
            /* 文字白色 */
            border: none;
            /* 清除边框 */
            border-radius: 17px;
            /* 圆角 */
            cursor: pointer;
            /* 鼠标悬浮显示手型 */
            font-size: 14px;
            /* 按钮文字大小 */
            transition: background-color 0.3s;
            /* 背景色过渡效果 */
        }

        /* 按钮悬浮时的样式 */
        .baidu-search button:hover {
            background-color: #337ecc;
            /* 加深蓝色，提升交互反馈 */
        }

        /* 搜索框右侧小图标容器（语音、拍照等，和百度一致） */
        .search-icons {
            position: absolute;
            right: 80px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            /* 横向排列图标 */
            gap: 10px;
            /* 图标间距 */
            align-items: center;
            /* 垂直居中 */
        }

        /* 小图标样式 */
        .search-icons img {
            width: 20px;
            height: 20px;
            cursor: pointer;
            /* 鼠标悬浮显示手型 */
        }

        /* 收藏网站容器样式 */
        .favorite-sites {
            width: 80%;
            /* 宽度占页面80% */
            margin: 0 auto;
            /* 水平居中 */
            display: grid;
            /* 网格布局，方便排列LOGO */
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            /* 自动适配列数，最小列宽80px */
            gap: 20px;
            /* LOGO之间的间距 */
            justify-items: center;
            /* 每个LOGO单元格居中 */
        }

        /* 单个收藏网站项样式 */
        .site-item {
            text-align: center;
            /* 文字居中 */
            text-decoration: none;
            /* 清除链接下划线 */
            color: #333;
            /* 文字颜色 */
        }

        /* LOGO图片样式 - 保持原图尺寸 */
        .site-item img {
            display: block;
            /* 清除图片默认间隙 */
            margin: 0 auto 5px;
            /* 图片居中，与文字间距5px */
            /* 关键：不设置宽高，保持原图尺寸 */
        }

        /* 网站名称文字样式 */
        .site-item span {
            font-size: 12px;
            /* 文字大小 */
            white-space: nowrap;
            /* 文字不换行 */
            overflow: hidden;
            /* 超出隐藏 */
            text-overflow: ellipsis;
            /* 超出显示省略号 */
            display: inline-block;
            /* 适配省略号样式 */
            max-width: 80px;
            /* 最大宽度，避免文字过长 */
        }
    </style>
</head>
<body>
    <!-- 时间日期显示区域 -->
    <div class="time-date" id="timeDate"></div>

    <!-- 百度搜索框区域 -->
    <div class="baidu-search">
        <input type="text" id="searchInput" placeholder="请输入搜索内容">
        <!-- 搜索框右侧小图标（语音、拍照、截图，用百度官方图标） -->
        <div class="search-icons">
            <img src="https://www.baidu.com/img/voiceicon.png" alt="语音搜索">
            <img src="https://www.baidu.com/img/camera_new_5606e8f.png" alt="拍照搜索">
            <img src="https://www.baidu.com/img/screenshot_icon.png" alt="截图搜索">
        </div>
        <button onclick="baiduSearch()">百度一下</button>
    </div>

    <!-- 收藏的常用网站区域 -->
    <div class="favorite-sites">
        <!-- 示例1：替换成你的LOGO路径和网站链接、名称 -->
        <a href="https://www.baidu.com" class="site-item" target="_blank">
            <img src="你的LOGO图片路径1" alt="百度">
            <span>百度</span>
        </a>
        <!-- 示例2：可无限添加，调整顺序只需修改HTML中item的位置 -->
        <a href="https://www.github.com" class="site-item" target="_blank">
            <img src="你的LOGO图片路径2" alt="GitHub">
            <span>GitHub</span>
        </a>
        <!-- 更多收藏项：复制上面的a标签，修改href、src、alt、span内容即可 -->
    </div>

    <script>
        // 1. 实时更新日期和时间
        function updateTimeDate() {
            const now = new Date();
            // 定义星期数组
            const weekDays = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
            // 格式化日期：年-月-日 星期X
            const dateStr = now.getFullYear() + "年" + 
                            (now.getMonth() + 1).toString().padStart(2, "0") + "月" + 
                            now.getDate().toString().padStart(2, "0") + "日 " + 
                            weekDays[now.getDay()];
            // 格式化时间：时:分:秒（补零）
            const timeStr = now.getHours().toString().padStart(2, "0") + ":" + 
                            now.getMinutes().toString().padStart(2, "0") + ":" + 
                            now.getSeconds().toString().padStart(2, "0");
            // 拼接并显示到页面
            document.getElementById("timeDate").innerText = dateStr + " " + timeStr;
        }

        // 页面加载时执行一次，然后每秒更新一次
        updateTimeDate();
        setInterval(updateTimeDate, 1000);

        // 2. 百度搜索功能
        function baiduSearch() {
            const searchText = document.getElementById("searchInput").value.trim();
            // 如果输入了内容，跳转到百度搜索结果页
            if (searchText) {
                const searchUrl = "https://www.baidu.com/s?wd=" + encodeURIComponent(searchText);
                window.open(searchUrl, "_blank");
            } else {
                // 未输入内容时提示
                alert("请输入搜索内容！");
            }
        }

        // 按下回车键触发搜索
        document.getElementById("searchInput").addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                baiduSearch();
            }
        });
    </script>
</body>
</html>
